name: Build and Push Docker Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # Transforma o nome do repositório em minúsculo para evitar problemas com o docker
  IMAGE_NAME_PREFIX: ghcr.io/${{ github.repository_owner }}/fidelidade

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build e Push do Backend
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_PREFIX }}-backend:latest
            ${{ env.IMAGE_NAME_PREFIX }}-backend:${{ github.sha }}

      # Build e Push do Frontend
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_PREFIX }}-frontend:latest
            ${{ env.IMAGE_NAME_PREFIX }}-frontend:${{ github.sha }}
